name: We Dare You Bot
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run bot
        run: python bot.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Commit history
        run: |
          git config --global user.name "We Dare You Bot"
          git config --global user.email "bot@github.com"
          echo "$(date)" > last_run.txt
          git add posted.json last_run.txt
          git commit -m "Update posted history" || echo "No changes"
          git push
